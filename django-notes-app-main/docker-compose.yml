version: "3.8"

services:

  db:
    image: mysql:8.0
    container_name: db_cont
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: test_db
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - notes-app-nw


  django_app:
    build: .
    container_name: django_cont
    restart: always
    command: sh -c "python manage.py migrate --noinput && gunicorn notesapp.wsgi:application --bind 0.0.0.0:8000"
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - notes-app-nw


  nginx:
    build: ./nginx
    container_name: nginx_cont
    restart: always
    ports:
      - "80:80"
    depends_on:
      - django_app
    networks:
      - notes-app-nw


volumes:
  mysql_data:


networks:
  notes-app-nw:
